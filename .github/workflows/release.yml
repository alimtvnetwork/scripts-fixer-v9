name: Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggers on semver tags pushed to the repo (e.g. v0.30.1, v1.0.0).
# Builds the release ZIP via release.ps1 and uploads it to the GitHub Release.
# Implements Issue #7 from spec/ci-cd/readme.md.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to package (e.g. v0.30.1). Used only for manual runs.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package and publish release ZIP
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: resolve
        shell: pwsh
        run: |
          $tagRef = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
              '${{ inputs.tag }}'
          } else {
              '${{ github.ref_name }}'
          }
          $tagVersion = $tagRef.TrimStart('v')
          "tag=$tagRef"         | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$tagVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved tag: $tagRef (version $tagVersion)"

      - name: Verify version alignment
        shell: pwsh
        run: |
          $tagVersion = '${{ steps.resolve.outputs.version }}'

          $latestFile = '.gitmap/release/latest.json'
          $isLatestPresent = Test-Path $latestFile
          if (-not $isLatestPresent) {
              Write-Host "::error file=$latestFile::latest.json missing -- cannot verify tag alignment"
              exit 1
          }
          $latestVersion = (Get-Content $latestFile -Raw | ConvertFrom-Json).version

          $versionFile = 'scripts/version.json'
          $isVersionPresent = Test-Path $versionFile
          if (-not $isVersionPresent) {
              Write-Host "::error file=$versionFile::version.json missing -- cannot verify tag alignment"
              exit 1
          }
          $scriptsVersion = (Get-Content $versionFile -Raw | ConvertFrom-Json).version

          Write-Host "Tag version            : $tagVersion"
          Write-Host "latest.json version    : $latestVersion"
          Write-Host "scripts/version.json   : $scriptsVersion"

          $isTagMatchingLatest = $tagVersion -eq $latestVersion
          if (-not $isTagMatchingLatest) {
              Write-Host "::error::Tag '$tagVersion' does not match .gitmap/release/latest.json '$latestVersion'."
              exit 1
          }

          $isScriptsAligned = $scriptsVersion -eq $latestVersion
          if (-not $isScriptsAligned) {
              Write-Host "::warning::scripts/version.json ($scriptsVersion) drifted from latest.json ($latestVersion). See spec/ci-cd Issue #1."
          }

      - name: Setup Node.js (for registry summary regen)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Drift check -- spec/script-registry-summary.md
        shell: pwsh
        run: |
          $generator = 'scripts/_internal/generate-registry-summary.cjs'
          $summary   = 'spec/script-registry-summary.md'

          $isGeneratorPresent = Test-Path $generator
          if (-not $isGeneratorPresent) {
              Write-Host "::error file=$generator::Generator script missing -- cannot verify drift"
              exit 1
          }

          $isSummaryPresent = Test-Path $summary
          if (-not $isSummaryPresent) {
              Write-Host "::error file=$summary::Committed registry summary missing -- run 'node $generator' locally"
              exit 1
          }

          $beforeHash = (Get-FileHash -Path $summary -Algorithm SHA256).Hash
          Write-Host "Committed summary SHA256 : $beforeHash"

          & node $generator | Out-Host
          $isGenOk = $LASTEXITCODE -eq 0
          if (-not $isGenOk) {
              Write-Host "::error::generate-registry-summary.cjs exited with code $LASTEXITCODE"
              exit 1
          }

          $afterHash = (Get-FileHash -Path $summary -Algorithm SHA256).Hash
          Write-Host "Regenerated summary SHA256: $afterHash"

          $isInSync = $beforeHash -eq $afterHash
          if (-not $isInSync) {
              Write-Host "::error file=$summary::Drift detected -- $summary is out of sync with scripts/registry.json + config.json files."
              Write-Host "::error::Run 'node $generator' locally, commit the result, then re-tag."
              Write-Host ""
              Write-Host "----- Diff (committed vs regenerated) -----" -ForegroundColor Yellow
              & git --no-pager diff --no-color -- $summary
              exit 1
          }

          Write-Host "[ OK ] $summary is in sync with registry + config sources."

      - name: Lint -- scripts/<folder>/config.json schemas
        shell: pwsh
        run: |
          $linter = 'scripts/_internal/lint-config-schemas.cjs'

          $isLinterPresent = Test-Path $linter
          if (-not $isLinterPresent) {
              Write-Host "::error file=$linter::Schema linter missing -- cannot validate config.json files"
              exit 1
          }

          # Linter exits 0 (OK or WARN-only) or 1 (one or more FAIL rows).
          # We propagate that exit code directly: FAIL blocks the release,
          # WARN does NOT. The linter also emits ::warning / ::error GHA
          # annotations inline so individual issues surface in the PR/tag UI.
          & node $linter
          $linterExit = $LASTEXITCODE

          if ($linterExit -eq 0) {
              Write-Host "[ OK ] config.json schema lint passed (warnings -- if any -- do not block)."
          }
          elseif ($linterExit -eq 1) {
              Write-Host "::error::config.json schema lint reported FAIL row(s) -- release blocked. Fix the offending config.json files and re-tag."
              exit 1
          }
          else {
              Write-Host "::error::config.json schema linter crashed (exit $linterExit). See log above."
              exit 1
          }

      - name: Build release ZIP
        shell: pwsh
        run: ./release.ps1 -Force

      - name: Locate release artifact
        id: artifact
        shell: pwsh
        run: |
          $version = '${{ steps.resolve.outputs.version }}'
          $zipPath = ".release/dev-tools-setup-v$version.zip"
          $isZipPresent = Test-Path $zipPath
          if (-not $isZipPresent) {
              Write-Host "::error file=$zipPath::Expected release ZIP was not produced by release.ps1"
              exit 1
          }
          $zipSizeKB = [math]::Round((Get-Item $zipPath).Length / 1024, 1)
          Write-Host "Built artifact: $zipPath ($zipSizeKB KB)"
          "path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Smoke test ZIP (run.ps1 -h)
        shell: pwsh
        run: |
          $zipPath = '${{ steps.artifact.outputs.path }}'
          $extractDir = Join-Path $env:RUNNER_TEMP "release-smoke"
          if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $runScript = Join-Path $extractDir 'run.ps1'
          $isRunPresent = Test-Path $runScript
          if (-not $isRunPresent) {
              Write-Host "::error file=$runScript::run.ps1 missing inside packaged ZIP"
              exit 1
          }

          # Help screen must complete without throwing.
          & $runScript -h | Out-Null
          if ($LASTEXITCODE -ne 0 -and $null -ne $LASTEXITCODE) {
              Write-Host "::error::run.ps1 -h exited with code $LASTEXITCODE inside extracted ZIP"
              exit 1
          }
          Write-Host "Smoke test passed: run.ps1 -h executed cleanly from packaged ZIP."

      - name: Compute SHA256 checksum
        id: checksum
        shell: pwsh
        run: |
          $zipPath = '${{ steps.artifact.outputs.path }}'
          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
          $checksumFile = "$zipPath.sha256"
          "$hash  $(Split-Path $zipPath -Leaf)" | Set-Content -Path $checksumFile -Encoding ASCII
          Write-Host "SHA256: $hash"
          "path=$checksumFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: ${{ steps.resolve.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifact.outputs.path }}
            ${{ steps.checksum.outputs.path }}
